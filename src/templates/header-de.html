@media (max-width: 768px){

  .site-header .logo-desktop{display:none}

}

/* ===== MOBILE NAV REDESIGN ===== */
.mobile-nav{position:fixed;inset:0;background:radial-gradient(ellipse 120% 80% at 50% 20%,rgba(139,26,10,.25),transparent 60%),radial-gradient(ellipse 80% 60% at 50% 90%,rgba(200,148,62,.08),transparent),rgba(9,6,5,.97);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;opacity:0;pointer-events:none;transition:opacity .4s ease;z-index:1300;overflow-y:auto;padding:24px}
.mobile-nav.open{opacity:1;pointer-events:all}

/* Reset old .mobile-nav a styles */
.mobile-nav a{border:none;border-radius:0;background:none;padding:0;font-size:inherit;font-weight:inherit;letter-spacing:inherit;text-transform:inherit;color:inherit;text-align:inherit;box-shadow:none;transform:none;opacity:1;margin:0}
.mobile-nav a:hover,.mobile-nav a:focus-visible{transform:none;color:inherit;border-color:transparent;background:none;filter:none}
.mobile-nav a[href^="tel:"]{font-size:inherit;letter-spacing:inherit;border-color:transparent;margin-top:0}

.mobile-nav-logo{width:120px;height:auto;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(200,148,62,.2));opacity:0;transform:translateY(-15px);transition:all .4s ease .1s}
.mobile-nav.open .mobile-nav-logo{opacity:1;transform:translateY(0)}

.mobile-nav-sep{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border:none;margin:12px auto 20px;opacity:0;transition:opacity .4s ease .2s}
.mobile-nav.open .mobile-nav-sep{opacity:1}

.mobile-nav-links{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px;padding:0}

.mobile-nav .mobile-nav-links a{display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--font-sans);font-size:14px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--cream);padding:16px 24px;background:var(--ruby);border:2px solid var(--ruby);border-radius:6px;text-align:center;text-decoration:none;transition:all .35s ease;opacity:0;transform:translateY(20px);box-shadow:0 4px 15px rgba(139,26,10,.3)}
.mobile-nav.open .mobile-nav-links a{opacity:1;transform:translateY(0)}
.mobile-nav.open .mobile-nav-links a:nth-child(1){transition-delay:.15s}
.mobile-nav.open .mobile-nav-links a:nth-child(2){transition-delay:.2s}
.mobile-nav.open .mobile-nav-links a:nth-child(3){transition-delay:.25s}
.mobile-nav.open .mobile-nav-links a:nth-child(4){transition-delay:.3s}

.mobile-nav .mobile-nav-links a:hover,.mobile-nav .mobile-nav-links a:active{background:#a12010;border-color:#a12010;color:var(--cream);transform:translateY(-2px);box-shadow:0 8px 30px rgba(139,26,10,.45)}

.mobile-nav a.mobile-nav-phone{display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--font-sans);font-size:18px;font-weight:700;letter-spacing:.1em;color:var(--bg);padding:18px 24px;background:var(--gold);border:2px solid var(--gold);border-radius:6px;text-align:center;text-decoration:none;margin-top:8px;width:100%;max-width:320px;transition:all .35s ease;opacity:0;transform:translateY(20px);box-shadow:0 4px 20px rgba(200,148,62,.25)}
.mobile-nav.open a.mobile-nav-phone{opacity:1;transform:translateY(0);transition-delay:.35s}
.mobile-nav a.mobile-nav-phone:hover,.mobile-nav a.mobile-nav-phone:active{background:var(--gold-light);border-color:var(--gold-light);color:var(--bg);transform:translateY(-2px);box-shadow:0 8px 30px rgba(200,148,62,.4)}
.mobile-nav-phone svg{width:20px;height:20px;fill:var(--bg);flex-shrink:0}

.mobile-nav-bottom{display:flex;align-items:center;gap:16px;margin-top:24px;opacity:0;transition:all .4s ease .4s}
.mobile-nav.open .mobile-nav-bottom{opacity:1}
.mobile-nav .mobile-nav-bottom .nav-lang{width:44px;height:30px;transition:transform .2s ease,opacity .2s;padding:0;display:inline-flex}
.mobile-nav .mobile-nav-bottom .nav-lang svg{width:32px;height:20px}
.mobile-nav .mobile-nav-bottom .nav-lang:hover{transform:scale(1.1);background:none}

.mobile-nav-close{position:fixed;top:24px;right:20px;width:48px;height:48px;border-radius:50%;border:2px solid rgba(200,148,62,.4);background:rgba(13,10,8,.6);color:var(--cream);font-size:28px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s ease;z-index:1310;backdrop-filter:blur(10px)}
.mobile-nav-close:hover,.mobile-nav-close:active{color:var(--gold);border-color:var(--gold);background:rgba(13,10,8,.8);transform:rotate(90deg)}

.mobile-nav-langs{display:none!important}
</style>
